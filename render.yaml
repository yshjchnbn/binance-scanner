    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SCANNER_API_KEY
        generateValue: true
      - key: FUTURES_REST_BASE
        value: https://fapi.binance.com
      - key: FUTURES_WS_URL
        value: wss://fstream.binance.com/market/ws/!ticker@arr
      - key: SPOT_REST_BASE
        value: https://data-api.binance.vision
      - key: MIN_QUOTE_VOLUME
        value: "20000000"
      - key: MAX_SPREAD_PCT
        value: "0.15"
      - key: RANK_SNAPSHOT_SECONDS
        value: "30"
      - key: MAX_CONCURRENT_REQUESTS
        value: "6"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "12"
